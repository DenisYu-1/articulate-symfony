version: 2

updates:
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
    versioning-strategy: increase-if-necessary
    open-pull-requests-limit: 5
    groups:
      symfony:
        patterns:
          - symfony/*
      testing:
        patterns:
          - phpunit/*

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
