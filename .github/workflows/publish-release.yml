name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Bundle release version, for example 0.2.0
        required: true
        type: string
      prerelease:
        description: Mark the GitHub release as a prerelease
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  publish:
    name: Tag and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2

      - name: Validate release version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          case "$VERSION" in
            v*) echo "Use the numeric version only, for example 0.2.0."; exit 1 ;;
          esac
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.-]+)?$'; then
            echo "Version must look like 0.2.0 or 0.2.0-beta.1."
            exit 1
          fi
          tag="${VERSION}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists."
            exit 1
          fi
          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"

      - name: Validate Composer metadata
        run: composer validate

      - name: Install dependencies
        run: composer update --no-interaction --no-progress --prefer-dist

      - name: Lint PHP files
        run: find src tests -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Run tests
        run: composer test

      - name: Read Articulate constraint
        run: |
          constraint=$(php -r '$c=json_decode(file_get_contents("composer.json"), true); echo $c["require"]["denisyu-1/articulate"] ?? "unknown";')
          echo "ARTICULATE_CONSTRAINT=$constraint" >> "$GITHUB_ENV"

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "action@github.com"
          git tag -a "$RELEASE_TAG" -m "Release $RELEASE_TAG"
          git push origin "$RELEASE_TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE_FLAG: ${{ inputs.prerelease && '--prerelease' || '' }}
        run: |
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --notes "Articulate constraint: \`${ARTICULATE_CONSTRAINT}\`" \
            $PRERELEASE_FLAG
